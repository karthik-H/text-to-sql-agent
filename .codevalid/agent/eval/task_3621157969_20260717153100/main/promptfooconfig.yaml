# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Agent eval — main (breakdown task_3621157969_20260717153100)"

prompts:
  - "{{ user_message }}"

providers:
  - file://providers.yaml

defaultTest:
  options:
    provider: file://../../../shared/judge_provider.yaml
    rubricPrompt: file://../../../shared/rubric_prompt.json
  assert:
    - type: llm-rubric
      value: "{{ rubric }}"

tests:
  - description: "Simple count query execution"
    vars:
      test_case_id: "simple_count_query_execution"
      user_message: "How many customers are in the database?"
      rubric: |
        - Generates a valid SQL query using the Customer table - Query executes without syntax errors on SQLite - Returns a numeric count result - Natural language answer reflects the actual query result - Does not invent tables or columns not in Chinook schema
      scenario_type: "happy_path"
      expected_tools: '["sql_db_query"]'
      precondition:
        {
                "hints": [
                        "Chinook database is accessible with Customer table populated"
                ]
        }

  - description: "Top selling artists with ordering"
    vars:
      test_case_id: "top_selling_artists_with_ordering"
      user_message: "What are the top 5 best-selling artists by total revenue?"
      rubric: |
        - Generates SQL query joining Artist, Album, Track, InvoiceLine tables - Uses SUM aggregation for revenue calculation - Includes ORDER BY clause for ranking - Limits results to top 5 - Query executes without syntax errors - Natural language answer lists exactly 5 artists with revenue figures - Only references real Chinook tables and columns
      scenario_type: "happy_path"
      expected_tools: '["sql_db_schema", "sql_db_query"]'
      precondition:
        {
                "hints": [
                        "Chinook database has Artist, Album, Track, InvoiceLine tables with related data"
                ]
        }

  - description: "Employee revenue performance query"
    vars:
      test_case_id: "employee_revenue_performance_query"
      user_message: "Which employee generated the most revenue from their customers?"
      rubric: |
        - Identifies correct relationship path: Employee to Customer to Invoice to InvoiceLine - Generates valid SQL with appropriate joins - Uses aggregation (SUM) to calculate revenue per employee - Orders results to identify top performer - Returns employee name and revenue amount - Query executes without syntax errors - Resources actual Chinook tables only
      scenario_type: "happy_path"
      expected_tools: '["sql_db_schema", "sql_db_query"]'
      precondition:
        {
                "hints": [
                        "Chinook database has Employee and Customer tables with valid foreign key relationships"
                ]
        }

  - description: "Filtered query with WHERE clause"
    vars:
      test_case_id: "filtered_query_with_where_clause"
      user_message: "List all customers from Canada showing their full names and email addresses."
      rubric: |
        - Generates query with WHERE Country = 'Canada' filter - Selects actual column names: FirstName, LastName, Email from Customer table - Does not use invented column names - Query executes without syntax errors - Returns list of Canadian customers - Natural language response reflects actual returned rows
      scenario_type: "edge_case"
      expected_tools: '["sql_db_schema", "sql_db_query"]'
      precondition:
        {
                "hints": [
                        "Customer table has records with Country = 'Canada'"
                ]
        }

  - description: "Query without hallucinated columns"
    vars:
      test_case_id: "query_without_hallucinated_columns"
      user_message: "Show me each track's name and its album title, but also include any bonus tracks count if available."
      rubric: |
        - Uses sql_db_schema or sql_db_list_tables to discover actual schema - References only Track and Album tables with their real columns - Does not hallucinate a 'bonus_tracks' column that doesn't exist - Either ignores the non-existent bonus_tracks request or explains it's not available - Generated SQL contains only valid column names from Chinook - Query executes without syntax errors
      scenario_type: "validation"
      expected_tools: '["sql_db_list_tables", "sql_db_schema", "sql_db_query"]'
      precondition:
        {
                "hints": [
                        "Track and Album tables exist with standard Chinook schema"
                ]
        }

  - description: "Aggregate query with GROUP BY"
    vars:
      test_case_id: "aggregate_query_with_group_by"
      user_message: "What is the total revenue for each genre?"
      rubric: |
        - Generates query joining Genre, Track, InvoiceLine tables - Uses GROUP BY clause for genre grouping - Applies SUM aggregation for revenue - Query executes without GROUP BY syntax errors - Returns list of genres with revenue totals - Natural language answer organizes results by genre - Only uses real tables and columns from Chinook
      scenario_type: "edge_case"
      expected_tools: '["sql_db_schema", "sql_db_query"]'
      precondition:
        {
                "hints": [
                        "Genre, Track, and InvoiceLine tables have related data"
                ]
        }

  - description: "Schema discovery for table names"
    vars:
      test_case_id: "schema_discovery_for_table_names"
      user_message: "List all playlists and the number of tracks in each playlist."
      rubric: |
        - Uses sql_db_list_tables or sql_db_schema to discover Playlist and PlaylistTrack tables - Generates query with correct table names: Playlist, PlaylistTrack - Does not use generic names like 'playlists' (lowercase) or 'PlayListData' - Joins tables correctly on PlaylistId - Query executes without 'no such table' errors - Returns playlist names with track counts
      scenario_type: "validation"
      expected_tools: '["sql_db_list_tables", "sql_db_schema", "sql_db_query"]'
      precondition:
        {
                "hints": [
                        "Playlist and PlaylistTrack tables exist in Chinook with related Track data"
                ]
        }

  - description: "Ambiguous question requires clarification"
    vars:
      test_case_id: "ambiguous_question_requires_clarification"
      user_message: "Show me the top customers."
      rubric: |
        - Agent recognizes ambiguity in 'top' (by revenue? by number of purchases? most recent?) - Either asks clarifying question about the criteria for 'top' - Or makes a reasonable assumption and states it clearly (e.g., 'by total revenue') - If executing query, uses only valid tables and columns - Query (if generated) executes without syntax errors
      scenario_type: "missing_info"
      expected_tools: '["sql_db_schema"]'
      precondition:
        {
                "hints": [
                        "Chinook database is accessible"
                ]
        }

  - description: "Schema inspection before complex query"
    vars:
      test_case_id: "schema_inspection_before_complex_query"
      user_message: "Which artists have released albums in the Rock genre?"
      rubric: |
        - Calls sql_db_schema (or sql_db_list_tables) to understand table structure - Identifies the correct join path: Artist -> Album -> Track -> Genre - Generates valid SQL with appropriate WHERE clause for Rock genre - Query executes without syntax errors - Returns artist names correctly - Does not hallucinate direct Artist-Genre relationship that doesn't exist
      scenario_type: "tool_selection"
      expected_tools: '["sql_db_schema", "sql_db_query"]'
      precondition:
        {
                "hints": [
                        "Artist, Album, Track, Genre tables exist with Genre containing 'Rock' entries"
                ]
        }
